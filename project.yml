name: FruitForm
options:
  bundleIdPrefix: com.fruitform
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "" # set to your own Apple Developer Team ID for device builds, then `xcodegen generate`
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO

targets:
  FruitForm:
    type: application
    platform: iOS
    sources:
      - path: FruitForm
    info:
      path: FruitForm/Info.plist
      properties:
        CFBundleDisplayName: FruitForm
        CFBundleShortVersionString: "0.1.0"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Used to photograph tomatoes and measure them with the depth camera."
        UIRequiredDeviceCapabilities:
          - arkit
        UIFileSharingEnabled: YES
        LSSupportsOpeningDocumentsInPlace: YES
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fruitform.app
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  FruitFormTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: FruitForm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fruitform.tests
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO

schemes:
  FruitForm:
    build:
      targets:
        FruitForm: all
    test:
      targets:
        - FruitFormTests
    run:
      config: Debug
