name: TomatoBreeder
options:
  bundleIdPrefix: com.tomatobreeder
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "49VHPYJQTL" # CHANGE ME to your own Apple Developer Team ID, then `xcodegen generate`
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO

targets:
  TomatoBreeder:
    type: application
    platform: iOS
    sources:
      - path: TomatoBreeder
    info:
      path: TomatoBreeder/Info.plist
      properties:
        CFBundleDisplayName: Tomato Breeder
        CFBundleShortVersionString: "0.1.0"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Used to photograph tomatoes and measure them with the depth camera."
        UIRequiredDeviceCapabilities:
          - arkit
        UIFileSharingEnabled: YES
        LSSupportsOpeningDocumentsInPlace: YES
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomatobreeder.app
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
